# SwiftLint Configuration for Unfold

disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - empty_string
  - fatal_error_message
  - force_unwrapping
  - unused_optional_binding
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

included:
  - Unfold
  - UnfoldTests

excluded:
  - Pods
  - .build
  - UnfoldUITests

# Rule Configuration
file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 40
    error: 50

type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 50
